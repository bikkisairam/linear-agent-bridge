project:
  name: "Hello Agent Demo"
  # Personal GitHub (bikkisairam) — not NDC org
  repo: "https://github.com/bikkisairam/hello-agent-demo"
  defaultBranch: main
  localPath: "../hello-agent-demo"
  memoryDir: memory

# Optional Linear tracking (workspace may still be NDC if that's where your Linear lives).
# Code + PRs always go to personal GitHub repos above.
linear:
  triggerLabel: "agent-approved"
  # Comment like native @Cursor — these phrases start an agent
  commentTriggers:
    - "@lab"
    - "@cursor"
  webhook:
    port: 8787
    path: /webhooks/linear
  pollSeconds: 15

cursor:
  runtime: cloud
  model: composer-2.5
  autoCreatePR: true

skills:
  - path: skills/small-fix.md

prompt:
  bootstrap: |
    You are fixing a small approved Linear issue in this repo.
    Read the issue carefully. Make a minimal change.
    Open a PR. Do not merge. Do not commit secrets.
    Prefer small, reviewable diffs.

    Before coding, read the project brain if present:
    - memory/INDEX.md
    - memory/issues/<ISSUE_ID>.md (if it exists)
    - any relevant memory/patterns/*.md

    After finishing (success or clear failure), update the project brain in this same PR when possible:
    - Update or create memory/issues/<ISSUE_ID>.md (goal, what changed, errors, open loops, PR link)
    - Append a short note under memory/sessions/
    - Keep INDEX.md current with one-line pointers
